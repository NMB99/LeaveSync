services:
  postgres:
    image: postgres:16
    container_name: leavesync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: leavesync-redis
    ports:
      - "6379:6379"

  mailhog:
    image: axllent/mailpit
    container_name: leavesync-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: